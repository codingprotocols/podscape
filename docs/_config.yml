title: Podscape
description: Kubernetes desktop management — documentation
remote_theme: just-the-docs/just-the-docs@v0.10.0

url: "https://codingprotocols.github.io"
baseurl: "/podscape"

# Favicon
# favicon_ico: "/assets/images/favicon.ico"

# Search
search_enabled: true
search:
  heading_level: 2
  previews: 2
  preview_words_before: 3
  preview_words_after: 3
  tokenizer_separator: /[\s\-/]+/
  rel_url: true
  button: false

# Navigation order for top-level pages
nav_sort: case_insensitive

# Footer
footer_content: "Copyright &copy; 2026 Coding Protocols Private Limited. Distributed under the MIT license."

# Color scheme: "light" or "dark"
color_scheme: dark

# Callout types
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# Apply just-the-docs layout to all pages automatically
defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default
  - scope:
      path: "**.md"
    values:
      layout: default

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
  - jekyll-sitemap
