<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
      -webkit-app-region: drag;
      user-select: none;
    }

    .container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(12, 14, 20, 0.88);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
    }

    /* subtle indigo glow behind the icon */
    .glow {
      position: absolute;
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.10) 0%, transparent 68%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -56%);
      pointer-events: none;
    }

    .icon {
      width: 80px;
      height: 80px;
      border-radius: 20px;
      margin-bottom: 18px;
      position: relative;
      z-index: 1;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: -0.4px;
      margin-bottom: 5px;
      position: relative;
      z-index: 1;
    }

    .tagline {
      font-size: 11px;
      font-weight: 500;
      color: #334155;
      letter-spacing: 0.04em;
      margin-bottom: 30px;
      position: relative;
      z-index: 1;
    }

    /* three-dot animated loader */
    .dots {
      display: flex;
      gap: 6px;
      position: relative;
      z-index: 1;
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #6366f1;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.22s; }
    .dot:nth-child(3) { animation-delay: 0.44s; }

    @keyframes pulse {
      0%, 60%, 100% { opacity: 0.18; transform: scale(0.7); }
      30%            { opacity: 1;    transform: scale(1);   }
    }

    .version {
      position: absolute;
      bottom: 14px;
      font-size: 10px;
      color: #1e293b;
      z-index: 1;
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="glow"></div>
    <img class="icon" src="./icon.png" alt="Podscape icon">
    <h1>Podscape</h1>
    <p class="tagline">Kubernetes management</p>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
    <span class="version" id="ver"></span>
  </div>

  <script>
    // Injected by main process via query param: splash.html?v=1.2.3
    const v = new URLSearchParams(location.search).get('v')
    if (v) document.getElementById('ver').textContent = 'v' + v
  </script>
</body>
</html>
