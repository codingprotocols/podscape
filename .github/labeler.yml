# Workflow to automatically label pull requests based on changed files
# https://github.com/actions/labeler

main:
  - changed-files:
    - any-glob-to-any-file: 'src/main/**/*'

renderer:
  - changed-files:
    - any-glob-to-any-file: 'src/renderer/**/*'

mcp:
  - changed-files:
    - any-glob-to-any-file: 'go-core/cmd/podscape-mcp/**/*'

core:
  - changed-files:
    - any-glob-to-any-file: 'go-core/cmd/podscape-core/**/*'
    - any-glob-to-any-file: 'go-core/internal/**/*'

devops:
  - changed-files:
    - any-glob-to-any-file: '.github/**/*'
    - any-glob-to-any-file: 'scripts/**/*'

docs:
  - changed-files:
    - any-glob-to-any-file: '**/*.md'
    - any-glob-to-any-file: 'docs/**/*'

dependencies:
  - changed-files:
    - any-glob-to-any-file: 'package.json'
    - any-glob-to-any-file: 'package-lock.json'
    - any-glob-to-any-file: 'go-core/go.mod'
    - any-glob-to-any-file: 'go-core/go.sum'
