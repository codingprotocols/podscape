name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────────
  # Use a native runner per arch so CGO (go-sqlite3, Helm dep) compiles without
  # cross-compilation toolchain gymnastics.
  release-mac:
    strategy:
      matrix:
        include:
          - runner: macos-latest   # arm64 — Apple Silicon (M1/M2/M3)
            goarch: arm64
            electron_arch: arm64
          - runner: macos-13       # x86_64 — Intel
            goarch: amd64
            electron_arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go-core/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS Icons
        run: npm run icon:icns

      - name: Build Go sidecar
        run: |
          cd go-core
          CGO_ENABLED=1 GOARCH=${{ matrix.goarch }} go build -o podscape-core ./cmd/podscape-core/

      - name: Build Electron (renderer + main + preload)
        run: npx electron-vite build

      - name: Package & publish macOS (${{ matrix.electron_arch }})
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --mac --arch ${{ matrix.electron_arch }} --publish always

      - name: Generate SHA256 checksums
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CHECKSUM_FILE="checksums-mac-${{ matrix.electron_arch }}.txt"
          cd dist
          shasum -a 256 *.dmg *.zip 2>/dev/null | tee "../${CHECKSUM_FILE}"
          cd ..
          gh release upload ${{ github.ref_name }} "${CHECKSUM_FILE}" --clobber

  # ── Windows ──────────────────────────────────────────────────────────────────
  release-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go-core/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Install ImageMagick
        run: choco install imagemagick

      - name: Generate Windows Icons
        run: npm run icon:ico

      # go-sqlite3 (indirect via Helm) needs a C compiler. MinGW ships with the
      # GitHub Actions Windows runner — just ensure it's on PATH.
      - name: Add MinGW to PATH (required for CGO)
        run: echo "C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Go sidecar
        run: |
          cd go-core
          go build -o podscape-core.exe ./cmd/podscape-core/
        env:
          CGO_ENABLED: '1'

      - name: Build Electron (renderer + main + preload)
        run: npx electron-vite build

      - name: Package & publish Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --win --publish always

      - name: Generate SHA256 checksums
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $files = Get-ChildItem dist\*.exe -ErrorAction SilentlyContinue
          $lines = $files | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          }
          $lines | Out-File -FilePath checksums-win.txt -Encoding utf8
          gh release upload ${{ github.ref_name }} checksums-win.txt --clobber

  # ── Linux ────────────────────────────────────────────────────────────────────
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go-core/go.sum

      # gcc is required for CGO (go-sqlite3). rpm/fakeroot/dpkg for electron-builder
      # packaging targets (AppImage + deb).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc rpm fakeroot dpkg imagemagick

      - name: Install dependencies
        run: npm ci

      - name: Generate Icons
        run: |
          npm run icon:icns || true
          npm run icon:ico || true

      - name: Build Go sidecar
        run: |
          cd go-core
          CGO_ENABLED=1 go build -o podscape-core ./cmd/podscape-core/

      - name: Build Electron (renderer + main + preload)
        run: npx electron-vite build

      - name: Package & publish Linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: npx electron-builder --linux --publish always

      - name: Generate SHA256 checksums
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          cd dist
          sha256sum *.AppImage *.deb 2>/dev/null | tee ../checksums-linux.txt
          cd ..
          gh release upload ${{ github.ref_name }} checksums-linux.txt --clobber
