name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── macOS ────────────────────────────────────────────────────────────────────
  release-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go-core/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icons
        run: npm run icon:icns

      # Import the Developer ID Application certificate into a temporary keychain
      # so electron-builder can sign the app. Skipped gracefully if secret is absent.
      - name: Import signing certificate
        if: ${{ env.CSC_LINK != '' }}
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          echo "$CSC_LINK" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "ci" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "ci" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci" "$KEYCHAIN_PATH"

      - name: Package & publish macOS
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build:mac -- --publish always

  # ── Windows ──────────────────────────────────────────────────────────────────
  release-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go-core/go.sum

      - name: Install dependencies
        run: npm ci

      - name: Install ImageMagick
        run: choco install imagemagick

      - name: Generate Windows icons
        run: npm run icon:ico

      # go-sqlite3 (indirect via Helm) needs a C compiler.
      - name: Add MinGW to PATH (required for CGO)
        run: echo "C:\ProgramData\Chocolatey\lib\mingw\tools\install\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Package & publish Windows
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CGO_ENABLED: '1'
        run: npm run build:win -- --publish always

  # ── Linux ────────────────────────────────────────────────────────────────────
  release-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go-core/go.sum

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc rpm fakeroot dpkg imagemagick

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: |
          npm run icon:icns || true
          npm run icon:ico || true

      - name: Package & publish Linux
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CGO_ENABLED: '1'
        run: npm run build:linux -- --publish always
