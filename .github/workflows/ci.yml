name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Detect Changes ──────────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      electron: ${{ steps.filter.outputs.electron }}
      go: ${{ steps.filter.outputs.go }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            electron:
              - 'src/**/*'
              - 'package.json'
              - 'package-lock.json'
              - 'electron-vite.config.ts'
              - 'tsconfig.json'
            go:
              - 'go-core/**/*'

  # ── TypeScript build + tests ──────────────────────────────────────────────────
  test-electron:
    needs: changes
    if: ${{ needs.changes.outputs.electron == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  # ── Go tests ──────────────────────────────────────────────────────────────────
  test-go:
    needs: changes
    if: ${{ needs.changes.outputs.go == 'true' || github.event_name == 'push' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true
          cache-dependency-path: go-core/go.sum

      - name: Run Go tests
        run: cd go-core && go test ./...
      
      - name: Go Build Check
        run: cd go-core && go build ./cmd/podscape-core/ && go build ./cmd/podscape-mcp/
